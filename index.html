<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japanese Conjugation Lab</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="header">
  <div class="cloud"></div><div class="cloud"></div><div class="cloud"></div><div class="cloud"></div>
  <svg viewBox="0 0 400 90" fill="none"><polygon points="200,5 80,90 320,90" fill="#7B9AAF"/><polygon points="200,5 170,28 230,28" fill="#E8EEF4"/><polygon points="170,28 155,40 200,38 245,40 230,28" fill="#D0DAE6" opacity="0.6"/></svg>
  <div class="header-title"><h1>Japanese Verb Lab</h1><div class="sub">Verb Conjugation Tool</div></div>
  <span class="deco r2">&#x26E9;</span><span class="deco r1">&#x1F3EF;</span>
</div>
<div class="app">
  <div class="top-row">
    <div>
      <div class="tile-slots" id="tiles"></div>
      <div class="tile-hint" id="tileHint"></div>
    </div>
    <div class="verb-info">
      <div class="kanji-line" id="vkanji"></div>
      <div class="meaning-line" id="vmeaning"></div>
      <div id="vtype"></div>
      <div class="english-line" id="venglish"></div>
    </div>
    <div class="top-row-actions">
      <button class="btn-sm shuffle" onclick="getRandomVerb()">Surprise me</button>
      <button class="btn-sm clear" onclick="clearAll()">Clear</button>
    </div>
  </div>
  <div class="content-row">
    <div class="hiragana-panel"><div class="chart-grid" id="chart"></div></div>
    <div class="right-panel">
      <div id="drillBar"></div>
      <div class="conj-panel" id="conjP"></div>
    </div>
  </div>
  <div class="filter-bar" id="filterBar">
    <input type="text" id="searchInput" placeholder="Search verbs (kanji, kana, english)..." oninput="onSearchInput()">
    <button class="jlpt-btn n5" onclick="toggleJlpt(5)">N5</button>
    <button class="jlpt-btn n4" onclick="toggleJlpt(4)">N4</button>
    <button class="jlpt-btn n3" onclick="toggleJlpt(3)">N3</button>
    <button class="jlpt-btn n2" onclick="toggleJlpt(2)">N2</button>
    <button class="jlpt-btn n1" onclick="toggleJlpt(1)">N1</button>
    <button class="exc-btn" id="excBtn" onclick="toggleExc()">Exceptions</button>
  </div>
  <div class="verb-selector" id="vbar"></div>
</div>

<script src="js/app.js"></script>
</body>
</html>
